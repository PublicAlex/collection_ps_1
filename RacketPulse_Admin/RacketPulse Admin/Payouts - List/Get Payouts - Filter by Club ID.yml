info:
  name: Get Payouts - Filter by Club ID
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/payer/payouts?clubId=56"
  params:
    - name: clubId
      value: "56"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

        test("All payouts belong to club 56", function () {
            var jsonData = res.getBody();
            jsonData.forEach(function(payout) {
                expect(payout.clubId).to.eql(56);
            });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Obtiene payouts filtrados por Club ID
