info:
  name: Get Payouts - Filter by Date Range
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/payer/payouts?status=pending_review&startDate=2024-01-01T00:00:00.000Z&endDate=2026-12-31T23:59:59.000Z"
  params:
    - name: status
      value: pending_review
      type: query
    - name: startDate
      value: 2024-01-01T00:00:00.000Z
      type: query
    - name: endDate
      value: 2026-12-31T23:59:59.000Z
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Obtiene payouts filtrados por rango de fechas y status
