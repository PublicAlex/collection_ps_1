info:
  name: 3. Approve Payout
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{base_url}}/payer/payouts/{{payout_id}}/approve"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "notes": "Approved via Full Flow Test"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Payout approved", function () {
            expect(res.getStatus()).to.equal(200);
            var jsonData = res.getBody();
            expect(jsonData.status).to.eql('approved');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
