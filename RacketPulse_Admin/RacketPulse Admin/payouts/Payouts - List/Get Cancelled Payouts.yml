info:
  name: Get Cancelled Payouts
  type: http
  seq: 7

http:
  method: GET
  url: "{{base_url}}/payer/payouts?status=cancelled"
  params:
    - name: status
      value: cancelled
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

        test("All payouts are cancelled", function () {
            var jsonData = res.getBody();
            jsonData.forEach(function(payout) {
                expect(payout.status).to.eql('cancelled');
            });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Obtiene payouts cancelados
