info:
  name: Get Pending Payouts
  type: http
  seq: 5

http:
  method: GET
  url: "{{base_url}}/payer/payouts/pending"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });

        test("All payouts are pending_review", function () {
            var jsonData = res.getBody();
            jsonData.forEach(function(payout) {
                expect(payout.status).to.eql('pending_review');
            });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Atajo para obtener solo payouts en estado pending_review
