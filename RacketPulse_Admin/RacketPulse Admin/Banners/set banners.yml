info:
  name: set banners
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/banners"
  body:
    type: json
    data: |
      {
        "imageUrl": "https://example.com/banner.jpg",   // requerido
        "title": "Summer promotion",                     // opcional
        "description": "Texto descriptivo",              // opcional
        "redirectLink": "https://example.com",           // opcional
        "isActive": true,                                // opcional, default true
        "displayOrder": 0,                               // opcional, default 0
        "startDate": "2025-06-01T00:00:00.000Z",        // opcional, null = sin restricción
        "endDate": "2025-08-31T23:59:59.000Z"           // opcional, null = sin expiración
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
