info:
  name: Health Check
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/external/appt/health"
  headers:
    - name: X-Secret-Key
      value: "{{secretKey}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{baseUrl}}/external/appt/health"
      method: GET
      headers:
        - name: X-Secret-Key
          value: "{{secretKey}}"
    response:
      statusText: "200"
      body:
        type: text
        data: |-
          {
            "status": "ok",
            "apptUsersCount": 150,
            "timestamp": "2026-01-30T12:00:00.000Z"
          }

docs: |-
  Verifica que la integración APPT está funcionando correctamente.

  Retorna:
  - Estado de la conexión
  - Cantidad de usuarios APPT importados
  - Timestamp
