      \          \"type\": \"short_text\",\r

      \          \"title\": \"Correo electrónico\",\r

      \          \"properties\": {}\r

      \        },\r

      \        {\r

      \          \"id\": \"y7HTRROJ5JfE\",\r

      \          \"ref\": \"380c3554-59d2-4857-a4b4-bc233a15e0ff\",\r

      \          \"type\": \"picture_choice\",\r

      \          \"title\": \"Las transiciones se entienden en tres (3) preguntas centrales\",\r

      \          \"properties\": {},\r

      \          \"choices\": [\r

      \            {\r

      \              \"id\": \"gkwtfH3OSKNf\",\r

      \              \"ref\": \"2410aed1-b667-4e0c-af65-d5fed0f8f835\",\r

      \              \"label\": \"¿Qué es? Definición\"\r

      \            },\r

      \            {\r

      \              \"id\": \"djrdFMFs2YrX\",\r

      \              \"ref\": \"ce2a3ce8-97ce-4793-8955-6e75e52c6b3a\",\r

      \              \"label\": \"¿Quiénes? Actores\"\r

      \            },\r

      \            {\r

      \              \"id\": \"UCHBSMdZVwRf\",\r

      \              \"ref\": \"d916e64f-c72c-482f-b931-3f19df28ae9a\",\r

      \              \"label\": \"¿Cómo? Proceso\"\r

      \            }\r

      \          ]\r

      \        },\r

      \        {\r

      \          \"id\": \"yoCzNt9WBQOn\",\r

      \          \"ref\": \"2857924a-538f-43b4-9029-583d93ba24f6\",\r

      \          \"type\": \"multiple_choice\",\r

      \          \"title\": \"Naturaleza de la transición\",\r

      \          \"properties\": {},\r

      \          \"choices\": [\r

      \            {\r

      \              \"id\": \"QM2IsjJAIvFP\",\r

      \              \"ref\": \"71e5ed03-5a6c-4ef4-8daf-0d0f19d9725b\",\r

      \              \"label\": \"\\\"Lo más importante en la transición es proteger los ecosistemas, incluso por encima de las necesidades humanas inmediatas.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"9yI7mpYKhJGa\",\r

      \              \"ref\": \"645590a5-428c-4bd5-9139-939507e0e969\",\r

      \              \"label\": \"\\\"Debemos cuidar el ambiente, pero sin olvidar a las personas que pueden verse afectadas por los cambios.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"t0cF2NHjqFmX\",\r

      \              \"ref\": \"262f15dc-67a5-4959-a6a2-0ed8526fc70c\",\r

      \              \"label\": \"\\\"La transición debe cuidar tanto la naturaleza como a las personas al mismo tiempo.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"xJkE8MxkjjLN\",\r

      \              \"ref\": \"28e9b793-5bd8-41fb-aec6-9d856d27e1d6\",\r

      \              \"label\": \"\\\"Para cuidar el clima, primero debemos reducir la desigualdad y crear empleos verdes.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"WU1yuF4ZGDpd\",\r

      \              \"ref\": \"36e51fff-94e1-4e2c-8539-ee1a6db7c4f6\",\r

      \              \"label\": \"\\\"El cambio climático es un problema de injusticia social, y la transición debe centrarse en mejorar la vida de las personas más vulnerables.\\\"\"\r

      \            }\r

      \          ]\r

      \        },\r

      \        {\r

      \          \"id\": \"tHcrfEoG3DOh\",\r

      \          \"ref\": \"4c510a95-7473-4b33-9aa7-db8879e9c095\",\r

      \          \"type\": \"multiple_choice\",\r

      \          \"title\": \"Tipos de transición\",\r

      \          \"properties\": {},\r

      \          \"choices\": [\r

      \            {\r

      \              \"id\": \"qByOhSv6BaGD\",\r

      \              \"ref\": \"ee06f1b8-dea0-402f-8c99-b29854a4933d\",\r

      \              \"label\": \"\\\"La transición debe ser una ruptura profunda con el modelo actual, para restaurar el equilibrio del planeta y detener el colapso ecológico.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"xXBk1s5oFiTs\",\r

      \              \"ref\": \"45e88e8b-8b40-4d94-9573-41da0c7c89df\",\r

      \              \"label\": \"\\\"Debemos avanzar hacia una economía baja en carbono mediante innovación tecnológica y regulación ambiental, sin detener el crecimiento económico.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"BFY46QeLncIf\",\r

      \              \"ref\": \"51e31e82-d19c-469a-b8fb-e183b611dfc1\",\r

      \              \"label\": \"\\\"La transición debe cambiar la relación entre humanos y naturaleza, haciendo compatibles el bienestar social y los límites ecológicos.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"RBaBPrEoEAOy\",\r

      \              \"ref\": \"c3b2ed36-aed8-44e6-88de-0e664bd6d196\",\r

      \              \"label\": \"\\\"La transición debe cambiar nuestros estilos de vida y patrones de consumo para que todos vivamos bien, dentro de las capacidades del planeta.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"MBM5T9kTym1H\",\r

      \              \"ref\": \"3b492577-4b49-4960-a1b0-f36eaf3283cd\",\r

      \              \"label\": \"\\\"La verdadera transición debe corregir las desigualdades estructurales, priorizando a quienes más han sufrido los impactos del sistema actual.\\\"\"\r

      \            }\r

      \          ]\r

      \        },\r

      \        {\r

      \          \"id\": \"qRIsMMPzhV1B\",\r

      \          \"ref\": \"83dd972d-af0b-4c82-b622-09f04a5f556c\",\r

      \          \"type\": \"multiple_choice\",\r

      \          \"title\": \"Ritmo\",\r

      \          \"properties\": {},\r

      \          \"choices\": [\r

      \            {\r

      \              \"id\": \"qO7wVpKI5765\",\r

      \              \"ref\": \"6f53bb5a-3897-4f10-8377-3b6cb95b7246\",\r

      \              \"label\": \"\\\"La transición debe comenzar ya, antes de que los daños al planeta sean irreversibles.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"l4EneVcnf7lL\",\r

      \              \"ref\": \"46846e1a-e71e-42f3-b657-6f1001a2cad0\",\r

      \              \"label\": \"\\\"Necesitamos transiciones rápidas, pero bien organizadas para no generar impactos negativos en las personas.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"YIo4RbPDHuZw\",\r

      \              \"ref\": \"6fe0b4ef-c2ef-48a7-a583-3471e2e86e8a\",\r

      \              \"label\": \"\\\"La transición debe avanzar paso a paso, equilibrando el cuidado ambiental con el bienestar social.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"WdcCTtqUseAX\",\r

      \              \"ref\": \"283dceb9-369e-4552-8e58-4a99665f6467\",\r

      \              \"label\": \"\\\"Las transiciones toman tiempo porque implican cambios en cómo vivimos, trabajamos y nos relacionamos.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"th6V1BRvtDoi\",\r

      \              \"ref\": \"3d286053-fdfe-4a1a-9e93-cbb6339c1cd3\",\r

      \              \"label\": \"\\\"La transición debe construirse con paciencia, priorizando la reparación de desigualdades históricas antes que la velocidad.\\\"\"\r

      \            }\r

      \          ]\r

      \        },\r

      \        {\r

      \          \"id\": \"qkA6nNBaQoZ7\",\r

      \          \"ref\": \"5008b1c8-797c-4e32-97ec-7de4605f7c85\",\r

      \          \"type\": \"multiple_choice\",\r

      \          \"title\": \"Escala\",\r

      \          \"properties\": {},\r

      \          \"choices\": [\r

      \            {\r

      \              \"id\": \"FLWTfCcJHmss\",\r

      \              \"ref\": \"313522ce-7779-4010-99c0-3ed224523f02\",\r

      \              \"label\": \"\\\"La transición debe abordarse desde una perspectiva global, ya que los efectos y soluciones del cambio climático trascienden fronteras.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"a3WbFCFPaDMM\",\r

      \              \"ref\": \"dae94d96-3a6e-4790-aa29-85d7cbfb50d1\",\r

      \              \"label\": \"\\\"Los Estados deben liderar la transición con políticas públicas integrales, adaptadas a las condiciones y prioridades del país.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"71Wpih00mwoO\",\r

      \              \"ref\": \"7758290a-6edc-4c7e-9496-7505368ad732\",\r

      \              \"label\": \"\\\"Es necesario hacer cambios desde los territorios, por sus realidades propias, y desde lo global, para lograr una transformación climática más amplia.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"V5HHnF3NQ1Ha\",\r

      \              \"ref\": \"ae234065-e017-4da2-8a51-c2b9ad71bc98\",\r

      \              \"label\": \"\\\"La transición necesita arraigarse en lo local, donde se viven directamente los impactos y se pueden construir soluciones concretas.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"lFaycz0b03C0\",\r

      \              \"ref\": \"9f430cf9-00f0-489c-84c1-d728efd137cb\",\r

      \              \"label\": \"\\\"La transición debe centrarse en los espacios históricamente invisibilizados, donde el cambio es más urgente y necesario.\\\"\"\r

      \            }\r

      \          ]\r

      \        },\r

      \        {\r

      \          \"id\": \"rAFbjxNlKok8\",\r

      \          \"ref\": \"a00daff9-6391-463b-ba8b-9771ea372172\",\r

      \          \"type\": \"multiple_choice\",\r

      \          \"title\": \"Actores involucrados\",\r

      \          \"properties\": {},\r

      \          \"choices\": [\r

      \            {\r

      \              \"id\": \"XQgspeUcxRO6\",\r

      \              \"ref\": \"c338e360-cf30-42a6-89c4-5d3efef4a521\",\r

      \              \"label\": \"\\\"La transición solo es posible si todos los actores —gobiernos, empresas, comunidades, organizaciones y academia— participan de forma activa y con responsabilidades compartidas.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"8BTA0QGd26JX\",\r

      \              \"ref\": \"f2449f02-3b1b-44b8-a362-ec1ed5682aa6\",\r

      \              \"label\": \"\\\"Los procesos de transición deben construirse en alianza entre el Estado y las comunidades, permitiendo participación pero con liderazgo institucional.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"OvRS9DF1RGSR\",\r

      \              \"ref\": \"164acc06-9a49-4805-a88b-6159fa7425f8\",\r

      \              \"label\": \"\\\"Se requiere la participación de varios actores, pero con un actor coordinador que oriente y articule los esfuerzos, sin perder la diversidad de voces.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"Y6hHrQLmxWqV\",\r

      \              \"ref\": \"f35ffaa4-6c61-4cac-ae2f-a22436272b7f\",\r

      \              \"label\": \"\\\"Un actor debe asumir el liderazgo de la transición —como el Estado o las comunidades—, recibiendo aportes de otros, pero sin depender de ellos.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"vHBwr3SPXCiE\",\r

      \              \"ref\": \"edb066a8-d437-41fc-a944-b67ac77eb5eb\",\r

      \              \"label\": \"\\\"La transición debe ser dirigida por un solo actor con legitimidad y capacidad, para garantizar coherencia y evitar interferencias externas.\\\"\"\r

      \            }\r

      \          ]\r

      \        },\r

      \        {\r

      \          \"id\": \"3heJYKbXUziW\",\r

      \          \"ref\": \"db374eb4-32e6-457c-9e5d-f70deb1e87b2\",\r

      \          \"type\": \"multiple_choice\",\r

      \          \"title\": \"Rol Estado\",\r

      \          \"properties\": {},\r

      \          \"choices\": [\r

      \            {\r

      \              \"id\": \"MbWH7gM0wQ5I\",\r

      \              \"ref\": \"17a3f192-a042-46b6-b0ee-86d2df6e0309\",\r

      \              \"label\": \"\\\"El Estado debe limitarse a generar las condiciones básicas para que otros actores —como el mercado, la sociedad civil o las comunidades— lideren los procesos de transición.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"Wf8U45yfN5f7\",\r

      \              \"ref\": \"97b4ec51-8ad5-4dd8-bf74-e00f9d49547c\",\r

      \              \"label\": \"\\\"El Estado debe actuar como mediador y conector entre sectores, garantizando que la transición sea incluyente, sin imponer rutas únicas.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"RCMYn5DXzh3E\",\r

      \              \"ref\": \"9dbcac2d-3fe0-42cc-8daf-d0f0a81eb8b8\",\r

      \              \"label\": \"\\\"El Estado debe tener un rol activo, guiando la transición con políticas claras, pero permitiendo que comunidades, empresas y otros actores definan cómo implementarlas.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"CQcfv9DudpZl\",\r

      \              \"ref\": \"ba0d2976-7b31-4188-84a8-1d61ac33eb4b\",\r

      \              \"label\": \"\\\"El Estado debe liderar la transición con decisiones firmes, inversiones públicas y regulación, pero escuchando a los territorios y actores sociales.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"Z6GGlfxdOoTL\",\r

      \              \"ref\": \"d4282388-abef-4bd6-a376-c60357e040da\",\r

      \              \"label\": \"\\\"Solo el Estado tiene la legitimidad y capacidad para dirigir la transición de forma coherente y justa; debe asumir el control total del proceso.\\\"\"\r

      \            }\r

      \          ]\r

      \        },\r

      \        {\r

      \          \"id\": \"nacJxKep9HZ6\",\r

      \          \"ref\": \"6f846b69-c6eb-475b-8adc-4854ad8017e0\",\r

      \          \"type\": \"multiple_choice\",\r

      \          \"title\": \"Rol Empresas\",\r

      \          \"properties\": {},\r

      \          \"choices\": [\r

      \            {\r

      \              \"id\": \"nYy2CwC2IJsc\",\r

      \              \"ref\": \"c85b1e5e-6e50-4e7c-8882-d604de23e1b6\",\r

      \              \"label\": \"\\\"Las empresas deben limitarse a cumplir regulaciones; no pueden liderar la transición porque sus intereses económicos no siempre se alinean con el bien común.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"bJkXZVABgFOk\",\r

      \              \"ref\": \"e24db4c5-7bcf-451f-bc15-b5511e5dcf39\",\r

      \              \"label\": \"\\\"Las empresas pueden participar en la transición, pero deben estar fuertemente reguladas por el Estado para asegurar que sus acciones no generen más desigualdad o daño ambiental.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"qA7Ww8HFKF52\",\r

      \              \"ref\": \"1d23c11e-120a-4491-8de6-5bf0444ca625\",\r

      \              \"label\": \"\\\"Las empresas tienen un papel importante, pero compartido: deben actuar junto al Estado y la sociedad civil para lograr una transición equilibrada y justa.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"Zj8zrbITGacd\",\r

      \              \"ref\": \"688a605c-7ccd-4491-bd69-15cd0d2201d8\",\r

      \              \"label\": \"\\\"Las empresas pueden acelerar la transición a través de innovación, inversión y escalamiento de soluciones, siempre que integren criterios sociales y ambientales en su modelo de negocio.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"DU2zl3rgar3F\",\r

      \              \"ref\": \"f36c4677-9f30-4ba1-8d13-efc2361ed583\",\r

      \              \"label\": \"\\\"La verdadera transformación vendrá del sector empresarial; la eficiencia, tecnología, generación de valor y capacidad de adaptación del mercado son clave para enfrentar el cambio climático.\\\"\"\r

      \            }\r

      \          ]\r

      \        },\r

      \        {\r

      \          \"id\": \"O4rzkJUbply0\",\r

      \          \"ref\": \"f7530e88-0690-421a-a7c0-038b9e0f2818\",\r

      \          \"type\": \"multiple_choice\",\r

      \          \"title\": \"Rol Comunidades\",\r

      \          \"properties\": {},\r

      \          \"choices\": [\r

      \            {\r

      \              \"id\": \"thqaFiZlQFyn\",\r

      \              \"ref\": \"3a03f13b-c799-434c-8a94-0349e2258402\",\r

      \              \"label\": \"“Las comunidades deben adaptarse a los planes definidos por expertos, gobiernos o empresas, ya que no tienen la capacidad técnica para liderar procesos complejos.”\"\r

      \            },\r

      \            {\r

      \              \"id\": \"Ro8C1jcvcsWn\",\r

      \              \"ref\": \"3e359d38-2d19-494a-9dcf-f0818591d8a2\",\r

      \              \"label\": \"\\\"Las comunidades pueden implementar acciones de transición, pero dentro de marcos definidos por actores institucionales o técnicos.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"BgnvNv7EBwem\",\r

      \              \"ref\": \"946c9100-0d61-4385-8de6-91d9b0208890\",\r

      \              \"label\": \"\\\"Las comunidades deben compartir responsabilidades en los procesos de transición, ya que entienden mejor su territorio y pueden liderar procesos desde lo local.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"uXTXSJOCHMOZ\",\r

      \              \"ref\": \"0c4a1d1d-e78c-4c64-ad3f-21954a6d3fb6\",\r

      \              \"label\": \"\\\"Las comunidades deben participar activamente para que la transición sea efectiva y sostenible, aportando conocimiento, experiencia y legitimidad local.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"bFD4NmHsOcAw\",\r

      \              \"ref\": \"55fc45cb-6c3b-47c3-8408-dd4a39751068\",\r

      \              \"label\": \"\\\"Las comunidades deben ser protagonistas de la transición, decidiendo por sí mismas cómo transformar su forma de vida, su economía y su relación con el entorno.\\\"\"\r

      \            }\r

      \          ]\r

      \        },\r

      \        {\r

      \          \"id\": \"2ktuE4cJBaDR\",\r

      \          \"ref\": \"bae93355-e334-4765-a967-d53eebc2f424\",\r

      \          \"type\": \"multiple_choice\",\r

      \          \"title\": \"OSC\",\r

      \          \"properties\": {},\r

      \          \"choices\": [\r

      \            {\r

      \              \"id\": \"aD1Hch3XtoEl\",\r

      \              \"ref\": \"f59910cb-8d88-4b7c-a970-1e9253758367\",\r

      \              \"label\": \"“Las organizaciones de la sociedad civil pueden opinar o acompañar, pero no deben interferir en las decisiones técnicas o de gobierno sobre la transición.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"LH5TKuGBPKXW\",\r

      \              \"ref\": \"2c83bc84-d2b7-46ff-be5c-4fedbd4b2e0e\",\r

      \              \"label\": \"\\\"Las OSC pueden cumplir una función útil como veedoras, generando presión social o ayudando a traducir decisiones institucionales hacia las comunidades.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"9tn9AeiVjiVq\",\r

      \              \"ref\": \"6422178a-ff26-403c-8b49-206902087555\",\r

      \              \"label\": \"\\\"Las OSC deben participar activamente junto con el Estado, las empresas y comunidades en el diseño e implementación de la transición.\\\"\"\r

      \            },\r

      \            {\r

      \              \"id\": \"7bEcORf9C9wq\",\r

      \              \"ref\": \"d53f17f1-3e64-48cd-997e-ae19aa0e1ff2\",\r

