info:
  name: Unirse al partido
  type: http
  seq: 3

http:
  method: POST
  url: "{{host}}/match_teams"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "match_id": 787,
        "user_id": 3651,
        "team": "team1",
        "position": "left"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Step required after creating the match: assigns the creator to team1/left position.

  Without this step the creator does NOT appear in /matches/user/:id/pending because that endpoint queries match_teams, not creator_id.
