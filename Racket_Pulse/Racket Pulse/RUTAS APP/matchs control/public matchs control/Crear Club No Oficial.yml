info:
  name: Crear Club No Oficial
  type: http
  seq: 1

http:
  method: POST
  url: "{{host}}/club_users/quick-setup"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "club_name": "Los Amigos 41",
        "location": "Carrer Segurana, Xàtiva, València, España",
        "location_coordinate": "38.9881694,-0.5156206",

      // datos opcionales que se pueden enviar para agregar mas detalles sobre el tipo de cancha

        "court_type": "cover", // cover , open
        "court_color": "blue", // red, blue, green, yellow, orange, purple, pink, brown, black, teal
        "court_has_lights": true,
        "court_max_players": 4,

      // datos opcionales de precio
        
          "court_currency": "EUR",
          "court_price": 40
       }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Crea automáticamente en una sola llamada:
  - Organización
  - Club no oficial (`is_unofficial: true`)
  - Pista virtual por defecto ("Pista 1")

  Solo accesible con token de tipo `user`. Devuelve `clubId`, `courtId` y `organizationId`.
