info:
  name: approve payout (patch)
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{host}}/admin/scheduled-payouts/{{payoutId}}/approve"
  headers:
    - name: Authorization
      value: Bearer {{token}}
      disabled: true
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "notes": "Approved via Full Flow Test"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
