info:
  name: get activity per day/week/month
  type: http
  seq: 3

http:
  method: GET
  url: "{{host}}/matches/dashboard/chart/club/1?startDate=2025-09-15&endDate=2025-11-31&groupBy=day&gameTypes=open&courtIds=5"
  params:
    - name: startDate
      value: 2025-09-15
      type: query
    - name: endDate
      value: 2025-11-31
      type: query
    - name: groupBy
      value: day
      type: query
    - name: gameTypes
      value: open
      type: query
      description: open, tournament, private, training, external, coaching
    - name: playerLevelFrom
      value: "1.0"
      type: query
      disabled: true
    - name: playerLevelTo
      value: "3.0"
      type: query
      disabled: true
    - name: courtIds
      value: "5"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
