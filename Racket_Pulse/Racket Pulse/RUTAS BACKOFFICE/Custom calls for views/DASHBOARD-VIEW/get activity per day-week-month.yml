info:
  name: get activity per day/week/month
  type: http
  seq: 3

http:
  method: GET
  url: "{{host}}/matches/dashboard/chart/club/109?startDate=2026-02-10&endDate=2026-03-10&groupBy=day&gameTypes=open,canceled&playerLevelFrom=1.0&playerLevelTo=3.0"
  params:
    - name: startDate
      value: 2026-02-10
      type: query
    - name: endDate
      value: 2026-03-10
      type: query
    - name: groupBy
      value: day
      type: query
    - name: gameTypes
      value: open,canceled
      type: query
    - name: playerLevelFrom
      value: "1.0"
      type: query
    - name: playerLevelTo
      value: "3.0"
      type: query
    - name: courtIds
      value: "5"
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  gametypes ['open', 'private', 'training', 'tournament', 'external', 'cancelled']
