info:
  name: backoffice progress list
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}/tasks/setup_progress/1?pending_only=false&completed_limit=10"
  params:
    - name: pending_only
      value: "false"
      type: query
    - name: completed_limit
      value: "10"
      type: query
      description: limitar el número de acciones completadas visibles (en caso de que el listado total de steps sea muy largo)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
