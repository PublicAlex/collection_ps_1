info:
  name: get players list from club
  type: http
  seq: 2

http:
  method: GET
  url: "{{host}}/users/search/players?levelMin=0.0&levelMax=4.0&gamesMin=1&gamesMax=25&fromDate=2024-06-01&toDate=2025-12-31&clubId=1&sortBy=level&sortOrder=-&page=1&limit=3"
  params:
    - name: levelMin
      value: "0.0"
      type: query
      description: advanced
    - name: levelMax
      value: "4.0"
      type: query
      description: advanced
    - name: gamesMin
      value: "1"
      type: query
      description: advanced
    - name: gamesMax
      value: "25"
      type: query
      description: advanced
    - name: fromDate
      value: 2024-06-01
      type: query
      description: advanced
    - name: toDate
      value: 2025-12-31
      type: query
      description: advanced
    - name: clubId
      value: "1"
      type: query
      description: campo opcional para filtrar players por clubs
    - name: sortBy
      value: level
      type: query
      description: name,email,level,register,games,lastGame
    - name: sortOrder
      value: "-"
      type: query
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "3"
      type: query
    - name: search
      value: john
      type: query
      description: busca por nombre o por email
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
