info:
  name: update strong password option
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{host}}/club_users/1/security-settings/strong-password"
  body:
    type: json
    data: "{\r

      \  \"requireStrongPassword\": true,  // or false\r

      \  \"clubId\": 1  //   enviar para propagar a todo el club\r

      }"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
