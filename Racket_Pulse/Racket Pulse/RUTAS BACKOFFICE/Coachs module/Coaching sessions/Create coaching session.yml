info:
  name: Create coaching session
  type: http
  seq: 1

http:
  method: POST
  url: "{{host}}/matches/team"
  body:
    type: json
    data: "{\r

      \  \"date\": \"2025-07-20\",\r

      \  \"court_id\": 1,\r

      \  \"start_time\": \"10:00\",\r

      \  \"end_time\": \"11:00\",\r

      \  \"game_mode\": \"training\",\r

      \  \"players_can_invite\": false,\r

      \r

      \  \"match_description\": \"Clase de técnica básica de pádel\",\r

      \  \r

      \ \"type\": \"coaching\",\r

      \  \"coach_profile_id\": 1,\r

      \  \"coaching_max_students\": 4,\r

      \  \"coaching_target_level\": \"beginner\",\r

      \  \"coaching_hourly_rate\": 45.00,\r

      \  \"coaching_class_description\": \"Clase enfocada en técnicas básicas de golpeo y posicionamiento en cancha\",\r

      \  \"coaching_objectives\": \"Mejorar técnica de drive y revés, trabajar voleas básicas\",\r

      \  \"coaching_specialties_focus\": [\"technique\", \"tactics\"],\r

      \  \"teams\": [1,2,3,4]\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
