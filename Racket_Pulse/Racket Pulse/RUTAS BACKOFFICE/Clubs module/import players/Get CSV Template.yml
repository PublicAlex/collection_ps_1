info:
  name: Get CSV Template
  type: http
  seq: 2

http:
  method: POST
  url: "{{host}}/external/club-import/{{clubId}}/players/csv/template"
  auth:
    type: bearer
    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..4DeqRaxRlEIlkYDMcNhOTe-ump4UXExDz398zq2Qx60

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success - Template
    request:
      url: "{{baseUrl}}/external/club-import/{{clubId}}/players/csv/template"
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{jwtToken}}
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "template": "email,display_name,first_name,last_name,gender,birthday,country_code,height,playing_hand,phone_prefix,phone,profile_picture,points,player_level",
            "example": "player@example.com,John Doe,John,Doe,M,1990-05-15,AU,180,R,+61,412345678,,1500,5.5",
            "fields": {
              "email": {
                "required": true,
                "description": "Player email address",
                "example": "player@example.com"
              },
              "display_name": {
                "required": true,
                "description": "Full name of the player",
                "example": "John Doe"
              },
              "first_name": {
                "required": false,
                "description": "First name",
                "example": "John"
              },
              "last_name": {
                "required": false,
                "description": "Last name",
                "example": "Doe"
              },
              "gender": {
                "required": false,
                "description": "Gender (M or F)",
                "example": "M"
              },
              "birthday": {
                "required": false,
                "description": "Birthday in YYYY-MM-DD format",
                "example": "1990-05-15"
              },
              "country_code": {
                "required": false,
                "description": "ISO Alpha-2 country code",
                "example": "AU"
              },
              "height": {
                "required": false,
                "description": "Height in centimeters",
                "example": "180"
              },
              "playing_hand": {
                "required": false,
                "description": "Playing hand (R for right, L for left)",
                "example": "R"
              },
              "phone_prefix": {
                "required": false,
                "description": "Phone prefix with +",
                "example": "+61"
              },
              "phone": {
                "required": false,
                "description": "Phone number without prefix",
                "example": "412345678"
              },
              "profile_picture": {
                "required": false,
                "description": "URL to profile picture",
                "example": "https://example.com/photo.jpg"
              },
              "points": {
                "required": false,
                "description": "Ranking points",
                "example": "1500"
              },
              "player_level": {
                "required": false,
                "description": "Player level from 1.0 to 10.0. If provided, the initial level will be set automatically.",
                "example": "5.5"
              }
            }
          }

docs: |-
  Obtiene el template CSV con headers y ejemplo.

  ## Response
  ```json
  {
    "template": "email,display_name,first_name,...",
    "example": "player@example.com,John Doe,John,...",
    "fields": {
      "email": {
        "required": true,
        "description": "Player email address"
      },
      ...
    }
  }
  ```
