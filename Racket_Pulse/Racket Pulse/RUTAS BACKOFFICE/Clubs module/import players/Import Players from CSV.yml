info:
  name: Import Players from CSV
  type: http
  seq: 1

http:
  method: POST
  url: "{{host}}/external/club-import/{{clubId}}/players/csv"
  headers:
    - name: Authorization
      value: Bearer {{jwtToken}}
      disabled: true
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value: []
        description: Archivo CSV con los jugadores a importar
  auth:
    type: bearer
    token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..4DeqRaxRlEIlkYDMcNhOTe-ump4UXExDz398zq2Qx60

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success - Players Imported
    request:
      url: "{{baseUrl}}/external/club-import/{{clubId}}/players/csv"
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{jwtToken}}
      body:
        type: multipart-form
        data:
          - name: file
            type: file
            value:
              - players.csv
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 200,
            "message": "CSV import completed: 2 created, 0 skipped, 0 errors",
            "clubId": 1,
            "stats": {
              "total": 2,
              "created": 2,
              "skipped": 0,
              "errors": 0
            },
            "results": [
              {
                "email": "player1@example.com",
                "success": true,
                "userId": 101,
                "isNewUser": true
              },
              {
                "email": "player2@example.com",
                "success": true,
                "userId": 102,
                "isNewUser": true
              }
            ]
          }
  - name: Error - No File
    request:
      url: "{{baseUrl}}/external/club-import/{{clubId}}/players/csv"
      method: POST
      headers:
        - name: Authorization
          value: Bearer {{jwtToken}}
      body:
        type: multipart-form
    response:
      statusText: "400"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "statusCode": 400,
            "message": "No file uploaded. Please provide a CSV file.",
            "error": "Bad Request"
          }

docs: |-
  Importa jugadores desde un archivo CSV.

  ## Request
  - **Method**: POST
  - **Content-Type**: multipart/form-data
  - **Authorization**: Bearer JWT Token

  ## Body
  - **file**: Archivo CSV con los datos de jugadores

  ## Response
  ```json
  {
    "statusCode": 200,
    "message": "CSV import completed: 45 created, 5 skipped, 2 errors",
    "clubId": 123,
    "stats": {
      "total": 52,
      "created": 45,
      "skipped": 5,
      "errors": 2
    },
    "results": [
      {
        "email": "player1@example.com",
        "success": true,
        "userId": 1001,
        "isNewUser": true
      }
    ]
  }
  ```
