info:
  name: Dissociate User from Club
  type: http
  seq: 2

http:
  method: DELETE
  url: "{{host}}/users/:userId/associate-club/:clubId"
  params:
    - name: userId
      value: "1"
      type: path
      description: ID del usuario a desasociar
    - name: clubId
      value: "1"
      type: path
      description: ID del club del cual desasociar
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: http://
      method: DELETE
    response:
      statusText: "200"
      body:
        type: text
        data: |-
          {
            "statusCode": 200,
            "message": "User dissociated from club successfully",
            "data": {
              "id": 5,
              "email": "player@example.com",
              "name": "John",
              "lastname": "Doe",
              "associatedClubIds": [1]
            }
          }
  - name: Success - User was not associated
    request:
      url: http://
      method: DELETE
    response:
      statusText: "200"
      body:
        type: text
        data: |-
          {
            "statusCode": 200,
            "message": "User dissociated from club successfully",
            "data": {
              "id": 5,
              "email": "player@example.com",
              "name": "John",
              "lastname": "Doe",
              "associatedClubIds": [1, 2]
            }
          }
  - name: Error - User not found
    request:
      url: http://
      method: DELETE
    response:
      statusText: "404"
      body:
        type: text
        data: |-
          {
            "statusCode": 404,
            "message": "User with ID 999 not found",
            "error": "Not Found"
          }

docs: |-
  Remueve la asociación entre un usuario y un club. El usuario ya no aparecerá en la lista de jugadores del club (a menos que haya jugado partidos ahí).

  **Roles permitidos:** organization, manager

  **Funcionamiento:**
  - Remueve `clubId` del array `associatedClubIds` del usuario

  **Notas:**
  - Si el usuario no estaba asociado, la operación no produce error
  - El usuario puede seguir apareciendo en búsquedas si tiene partidos en el club
  - Útil para remover jugadores individualmente después de una clonación masiva
